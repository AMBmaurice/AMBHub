<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMBHub - Connexion</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- IMPORTATION POLICES : MONTSERRAT (EQUILIBRE PARFAIT) + PLUS JAKARTA SANS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #a64b2a, #be5733, #80351b, #933f21);
            background-size: 400% 400%;
            animation: liquidBackground 16s ease infinite;
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
            color: #F2EBD9;
            position: relative;
        }

        @keyframes liquidBackground {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .login-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        /* TITRE : NI TROP COMPRIMÉ, NI TROP ETIRÉ */
        .hub-title {
            font-family: 'Montserrat', sans-serif;
            color: #F2EBD9;
            font-size: 4.2rem;
            font-weight: 800;
            letter-spacing: 6px;
            text-transform: uppercase;
            position: absolute;
            transition: all 1.8s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 11;
            pointer-events: none;
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }

        .hub-title.shrunk {
            font-size: 2.4rem;
            position: relative;
            margin-bottom: 25px;
            letter-spacing: 4px;
        }

        /* CARTE GLASSMORPHISME */
        .login-card {
            width: 100%;
            background: rgba(24, 18, 16, 0.45);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(242, 235, 217, 0.18);
            border-radius: 22px;
            padding: 40px 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transform: translateY(30px);
            transition: all 1.2s ease-out;
        }

        .login-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group i.input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(242, 235, 217, 0.7);
            font-size: 0.95rem;
        }

        .input-group input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            background: rgba(242, 235, 217, 0.12);
            border: 1px solid rgba(242, 235, 217, 0.15);
            border-radius: 12px;
            outline: none;
            color: #F2EBD9;
            font-size: 0.95rem;
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: all 0.3s;
        }

        .input-group input::placeholder {
            color: rgba(242, 235, 217, 0.55);
        }

        .input-group input:focus {
            background: rgba(242, 235, 217, 0.22);
            border-color: rgba(242, 235, 217, 0.4);
            box-shadow: 0 0 15px rgba(242, 235, 217, 0.1);
        }

        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(242, 235, 217, 0.7);
            cursor: pointer;
            font-size: 0.95rem;
            transition: opacity 0.2s;
        }

        .toggle-password:hover {
            color: #F2EBD9;
        }

        .remember-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
            color: rgba(242, 235, 217, 0.85);
            font-size: 0.88rem;
            user-select: none;
            cursor: pointer;
        }

        .remember-group input[type="checkbox"] {
            accent-color: #F2EBD9;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        /* BOUTON REDESIGNÉ : ÉLÉGANT, NET ET ULTRA-LISIBLE */
        .login-btn {
            width: 100%;
            padding: 15px;
            background: #F2EBD9;
            border: none;
            border-radius: 12px;
            color: #6b2d18;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .login-btn:hover {
            background: #ffffff;
            color: #a64b2a;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h1 class="hub-title" id="hubTitle">AMBHub</h1>

        <div class="login-card" id="loginCard">
            <form method="POST" action=".">
                {% csrf_token %}
                <div class="input-group">
                    <i class="fa-solid fa-user input-icon"></i>
                    <input type="text" name="username" placeholder="Identifiant" required autocomplete="username">
                </div>
                
                <div class="input-group">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" name="password" id="passwordInput" placeholder="Mot de passe" required autocomplete="current-password">
                    <i class="fa-solid fa-eye toggle-password" id="togglePassword"></i>
                </div>

                <label class="remember-group">
                    <input type="checkbox" name="remember_me" value="1">
                    <span>Se souvenir de moi</span>
                </label>

                <button type="submit" class="login-btn">Se connecter</button>
            </form>
        </div>
    </div>

    <script>
        const hubTitle = document.getElementById('hubTitle');
        const loginCard = document.getElementById('loginCard');
        const passwordInput = document.getElementById('passwordInput');
        const togglePassword = document.getElementById('togglePassword');

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                hubTitle.classList.add('shrunk');
            }, 1200);

            setTimeout(() => {
                loginCard.classList.add('visible');
            }, 2200);
        });

        togglePassword.addEventListener('click', () => {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                togglePassword.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                togglePassword.classList.replace('fa-eye-slash', 'fa-eye');
            }
        });
    </script>
</body>
</html>
