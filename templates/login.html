<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMBHub - Connexion</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* FOND IDENTIQUE A ONLINEREGISTRY */
            background: linear-gradient(135deg, #2A548A 0%, #3B6FA8 50%, #4A7EB8 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* CONTENEUR DES VAGUES ORGANIQUES DU HUB (Superposé au dégradé) */
        .bg-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
        }

        .wave-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(140px); 
            opacity: 0.65;
        }

        /* COULEURS SIGNATURE DU HUB MAURITIUS */
        .blob-red {
            width: 1000px;
            height: 1000px;
            background: radial-gradient(circle, #d01c1f 0%, rgba(208,28,31,0) 75%);
            top: -20%;
            left: -20%;
            animation: waveRed 14s infinite ease-in-out alternate;
        }

        .blob-blue {
            width: 1100px;
            height: 1100px;
            background: radial-gradient(circle, #2d3359 0%, rgba(45,51,89,0) 75%);
            bottom: -30%;
            left: -10%;
            animation: waveBlue 18s infinite ease-in-out alternate;
        }

        .blob-yellow {
            width: 1000px;
            height: 1000px;
            background: radial-gradient(circle, #f7b718 0%, rgba(247,183,24,0) 75%);
            top: -30%;
            right: -10%;
            animation: waveYellow 12s infinite ease-in-out alternate;
        }

        .blob-green {
            width: 1100px;
            height: 1100px;
            background: radial-gradient(circle, #008658 0%, rgba(0,134,88,0) 75%);
            bottom: -20%;
            right: -20%;
            animation: waveGreen 16s infinite ease-in-out alternate;
        }

        @keyframes waveRed {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30vw, 20vh) scale(1.1); }
            100% { transform: translate(15vw, 40vh) scale(1); }
        }

        @keyframes waveBlue {
            0% { transform: translate(0, 0) scale(1.05); }
            50% { transform: translate(25vw, -30vh) scale(0.95); }
            100% { transform: translate(40vw, -15vh) scale(1.1); }
        }

        @keyframes waveYellow {
            0% { transform: translate(0, 0) scale(0.95); }
            50% { transform: translate(-35vw, 25vh) scale(1.1); }
            100% { transform: translate(-20vw, 45vh) scale(1); }
        }

        @keyframes waveGreen {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-25vw, -25vh) scale(1.15); }
            100% { transform: translate(-45vw, -10vh) scale(0.95); }
        }

        /* INTERFACE & CARTE GLASSMORPHISM SOMBRE STYLISÉE */
        .login-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .hub-title {
            color: #ffffff;
            font-size: 5rem;
            font-weight: 800;
            letter-spacing: 5px;
            position: absolute;
            transition: all 1.8s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 11;
            pointer-events: none;
            text-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .hub-title.shrunk {
            font-size: 2.3rem;
            position: relative;
            margin-bottom: 25px;
            letter-spacing: 2px;
        }

        .login-card {
            width: 100%;
            background: rgba(42, 84, 138, 0.25);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
            opacity: 0;
            transform: translateY(30px);
            transition: all 1.2s ease-out;
        }

        .login-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .input-group {
            position: relative;
            margin-bottom: 22px;
        }

        .input-group i.input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
        }

        .input-group input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            outline: none;
            color: #fff;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .input-group input:focus {
            border-color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            font-size: 0.95rem;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: #ffffff;
            border: none;
            border-radius: 10px;
            color: #2F619E;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 5px;
        }

        .login-btn:hover {
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="bg-container">
        <div class="wave-blob blob-red"></div>
        <div class="wave-blob blob-blue"></div>
        <div class="wave-blob blob-yellow"></div>
        <div class="wave-blob blob-green"></div>
    </div>

    <div class="login-container">
        <h1 class="hub-title" id="hubTitle">AMBHub</h1>

        <div class="login-card" id="loginCard">
            <form method="POST" action=".">
                {% csrf_token %}
                <div class="input-group">
                    <i class="fa-solid fa-user input-icon"></i>
                    <input type="text" name="username" placeholder="Identifiant" required autocomplete="username">
                </div>
                
                <div class="input-group">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" name="password" id="passwordInput" placeholder="Mot de passe" required autocomplete="current-password">
                    <i class="fa-solid fa-eye toggle-password" id="togglePassword"></i>
                </div>

                <button type="submit" class="login-btn">Se connecter</button>
            </form>
        </div>
    </div>

    <script>
        const hubTitle = document.getElementById('hubTitle');
        const loginCard = document.getElementById('loginCard');
        const passwordInput = document.getElementById('passwordInput');
        const togglePassword = document.getElementById('togglePassword');

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                hubTitle.classList.add('shrunk');
            }, 1200);

            setTimeout(() => {
                loginCard.classList.add('visible');
            }, 2200);
        });

        togglePassword.addEventListener('click', () => {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                togglePassword.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                togglePassword.classList.replace('fa-eye-slash', 'fa-eye');
            }
        });
    </script>
</body>
</html>
