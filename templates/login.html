<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMBHub - Connexion</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #d53e1d, #e85a37, #9e260e, #b83214);
            background-size: 400% 400%;
            animation: liquidBackground 15s ease infinite;
            position: relative;
        }

        @keyframes liquidBackground {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .login-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .hub-title {
            color: #ffffff;
            font-size: 5rem;
            font-weight: 800;
            letter-spacing: 5px;
            position: absolute;
            transition: all 1.8s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 11;
            pointer-events: none;
            text-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
        }

        .hub-title.shrunk {
            font-size: 2.3rem;
            position: relative;
            margin-bottom: 25px;
            letter-spacing: 2px;
        }

        .login-card {
            width: 100%;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
            opacity: 0;
            transform: translateY(30px);
            transition: all 1.2s ease-out;
        }

        .login-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group i.input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.75);
            font-size: 0.95rem;
        }

        .input-group input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            background: rgba(255, 255, 255, 0.18);
            border: none;
            border-radius: 12px;
            outline: none;
            color: #fff;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .input-group input:focus {
            background: rgba(255, 255, 255, 0.28);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.15);
        }

        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.8);
            cursor: pointer;
            font-size: 0.95rem;
            transition: opacity 0.2s;
        }

        .toggle-password:hover {
            color: #ffffff;
        }

        .remember-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.88rem;
            user-select: none;
            cursor: pointer;
        }

        .remember-group input[type="checkbox"] {
            accent-color: #ffffff;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: #ffffff;
            border: none;
            border-radius: 12px;
            color: #d53e1d;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-btn:hover {
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h1 class="hub-title" id="hubTitle">AMBHub</h1>

        <div class="login-card" id="loginCard">
            <form method="POST" action=".">
                {% csrf_token %}
                <div class="input-group">
                    <i class="fa-solid fa-user input-icon"></i>
                    <input type="text" name="username" placeholder="Identifiant" required autocomplete="username">
                </div>
                
                <div class="input-group">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" name="password" id="passwordInput" placeholder="Mot de passe" required autocomplete="current-password">
                    <i class="fa-solid fa-eye toggle-password" id="togglePassword"></i>
                </div>

                <label class="remember-group">
                    <input type="checkbox" name="remember_me" value="1">
                    <span>Se souvenir de moi</span>
                </label>

                <button type="submit" class="login-btn">Se connecter</button>
            </form>
        </div>
    </div>

    <script>
        const hubTitle = document.getElementById('hubTitle');
        const loginCard = document.getElementById('loginCard');
        const passwordInput = document.getElementById('passwordInput');
        const togglePassword = document.getElementById('togglePassword');

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                hubTitle.classList.add('shrunk');
            }, 1200);

            setTimeout(() => {
                loginCard.classList.add('visible');
            }, 2200);
        });

        togglePassword.addEventListener('click', () => {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                togglePassword.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                togglePassword.classList.replace('fa-eye-slash', 'fa-eye');
            }
        });
    </script>
</body>
</html>
